<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            background-color: black;
        }

        .container-flex {
            
            height: 200px;
            border: 4px solid red;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
        }

        .container-flex > div {
            font-size: 2rem;
            border: 4px solid white;
            color: white;
            padding: 4px;
            margin: 4px;
        }

        .coluna {
            flex-direction: column;
        }

        h1,h2 {
            color: aqua;
        }

        .item1,.item3 {
            flex-grow: 1;
        }


        .item2 {
            flex-grow: 0;
        }
        
    </style>
</head>
<body>
    <h1>Alinhamentos</h1>

    <h2>row</h2>
    <div class="container-flex">
        <div class="item1">Item teste 01</div>
        <div class="item2">Item teste 02</div>
        <div class="item3">Item teste 03</div>
        <!--<div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div> -->
    </div>

    <h2>column</h2>
    <div class="container-flex coluna">
        <div>01</div>
        <div>02</div>
        <div>03</div>
       <!-- <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div> -->
    </div>
</body>
</html>
